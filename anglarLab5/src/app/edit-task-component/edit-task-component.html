<div class="form-container">
  <h2>
    <span class="id" [attr.data-id]="[`${task$.id}`]"></span>
  </h2>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="taskName">Название задачи</label>
      <input
        type="text"
        id="taskName"
        class="form-control"
        formControlName="title"
        placeholder="Введите название задачи"
        [class.is-invalid]="title?.invalid && title?.touched">
      <div *ngIf="title?.invalid && title?.touched" class="validation-error">
        <small *ngIf="title?.errors?.['required']">Название задачи обязательно</small>
      </div>
    </div>

    <div class="form-group">
      <label for="taskStatus">Статус</label>
      <select
        id="taskStatus"
        class="form-control"
        formControlName="status">

        <option *ngFor="let status of statuses" [ngValue]="status.value">
          {{ status.label }}
        </option>
      </select>

    </div>

    <div class="button-group">
      <button
        type="submit"
        class="btn btn-primary">
        Сохранить
      </button>

      <button
        type="button"
        class="btn btn-secondary"
        (click)="onCancel()">
        Отмена
      </button>
    </div>
  </form>
</div>
